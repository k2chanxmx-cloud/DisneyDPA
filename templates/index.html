<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#14213d">
  <title>DPA Forecast</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">TOKYO DISNEYLAND</p>
        <h1>DPA Forecast</h1>
      </div>
      <div id="connectionBadge" class="status-badge">確認中</div>
    </header>

    <main class="content">
      <section id="forecastScreen" class="screen active">
        <div class="hero-card">
          <p class="section-label">来園日を入力</p>
          <div class="form-grid">
            <label>
              <span>来園予定日</span>
              <input id="targetDate" type="date">
            </label>
            <label>
              <span>入園予定時刻</span>
              <input id="entryTime" type="time" value="10:00" step="1800">
            </label>
          </div>
          <button id="forecastButton" class="primary-button">この日の予測を見る</button>
        </div>

        <div id="forecastEmpty" class="empty-card">
          日付を選ぶと、混雑予測とDPA取得率を表示します。
        </div>

        <div id="forecastResult" class="hidden">
          <div id="daySummary" class="summary-card"></div>
          <div id="attractionCards" class="card-list"></div>
          <div class="panel-card">
            <h2>予測の根拠</h2>
            <ul id="reasonList" class="reason-list"></ul>
          </div>
        </div>
      </section>

      <section id="analyticsScreen" class="screen">
        <div class="screen-heading">
          <p class="section-label">蓄積データの傾向</p>
          <h2>分析結果情報</h2>
        </div>
        <div id="analyticsContent" class="card-list">
          <div class="empty-card">読み込み中です。</div>
        </div>
      </section>

      <section id="databaseScreen" class="screen">
        <div class="screen-heading">
          <p class="section-label">閲覧専用</p>
          <h2>分析情報データベース</h2>
        </div>

        <div class="filter-card">
          <label>
            <span>開始日</span>
            <input id="dbDateFrom" type="date">
          </label>
          <label>
            <span>終了日</span>
            <input id="dbDateTo" type="date">
          </label>
          <button id="dbSearchButton" class="secondary-button">絞り込む</button>
        </div>

        <div id="databaseContent" class="card-list">
          <div class="empty-card">読み込み中です。</div>
        </div>

        <div class="pager">
          <button id="prevPageButton" class="pager-button">前へ</button>
          <span id="pageLabel">1ページ</span>
          <button id="nextPageButton" class="pager-button">次へ</button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button class="nav-button active" data-screen="forecastScreen">
        <span class="nav-icon">🔮</span>
        <span>日付予測</span>
      </button>
      <button class="nav-button" data-screen="analyticsScreen">
        <span class="nav-icon">📊</span>
        <span>分析結果</span>
      </button>
      <button class="nav-button" data-screen="databaseScreen">
        <span class="nav-icon">🗃</span>
        <span>データベース</span>
      </button>
    </nav>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
